# Midi Fighter 3D Multi-Bank Configuration
# Grid buttons normalized to 0-15 per bank
# Bank switches: Channel 3, notes 0-3
# Grid buttons: Channel 2, notes mapped per bank

midi:
  port_name: "Midi Fighter 3D:Midi Fighter 3D MIDI 1 20:0"
  # Channel 2 for grid (0-indexed: 1), Channel 3 for bank switches (0-indexed: 2)
  grid_channel: 1
  bank_channel: 2

# Sound resources - define reusable sounds with default settings
sounds:
  camera:
    file: sounds/camera.mp3
    volume: 1.0
  alert:
    file: sounds/alert.mp3
    volume: 0.8
  success:
    file: sounds/success.mp3
    volume: 1.0
  error:
    file: sounds/error.mp3
    volume: 0.9

# Button mappings - each button can have a sound, an action, or both
# Action types: script, webhook, keyboard
# 
# Action formats:
#   script:  {type: "script", file: "script.sh", args: ["arg1"], blocking: false}
#   webhook: {type: "webhook", url: "https://...", method: "POST", headers: {...}, body: {...}}
#   keyboard: {type: "keyboard", shortcut: "ctrl+shift+a"}
banks:
